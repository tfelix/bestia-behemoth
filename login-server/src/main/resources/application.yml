server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:mem:login
    driver-class-name: org.h2.Driver
    username: sa
    password: password
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: false  # Optional: Show SQL statements in logs
    open-in-view: false

eip712:
  name: "Bestia Login"
  version: "1"
  chain-id: 1

jwt:
  secret: "your-secret-key-here-change-in-production"
  # Validity (days) of the long-lived refresh token.
  expiration-days: 5
  # Validity (minutes) of the short-lived zone login token. Kept generous for development
  # so the client does not need a refresh loop yet.
  login-token-minutes: 60

ethereum:
  rpc-url: "https://mainnet.infura.io/v3/YOUR_PROJECT_ID"
  nft-contract-address: "0x0000000000000000000000000000000000000000"
  # Set to false to completely disable NFT ownership checks
  enable-nft-verification: false
