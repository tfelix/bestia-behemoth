syntax = "proto3";

package bnet;

import "messages/component/position_component.proto";
import "messages/component/bestia_visual_component.proto";
import "messages/component/item_visual_component.proto";
import "messages/component/exp_component_smsg.proto";
import "messages/component/level_component_smsg.proto";
import "messages/system/ping.proto";
import "messages/system/chat_cmsg.proto";
import "messages/system/chat_smsg.proto";
import "messages/system/authentication.proto";
import "messages/system/operation_error.proto";
import "messages/system/operation_success.proto";
import "messages/entity/move_active_entity.proto";
import "messages/entity/get_all_entities.proto";
import "messages/entity/select_active_entity.proto";
import "messages/system/authentication_success.proto";
import "messages/system/disconnected.proto";
import "messages/master/get_master_cmsg.proto";
import "messages/master/get_self_cmsg.proto";
import "messages/master/self_smsg.proto";
import "messages/master/master.proto";
import "messages/master/select_master_cmsg.proto";
import "messages/master/create_master_cmsg.proto";
import "messages/component/master_visual_component_smsg.proto";
import "messages/component/path_component_smsg.proto";
import "messages/component/speed_component_smsg.proto";
import "messages/component/health_component_smsg.proto";
import "messages/component/mana_component_smsg.proto";
import "messages/component/stamina_component_smsg.proto";
import "messages/component/carry_capacity_component_smsg.proto";
import "messages/component/inventory_component_smsg.proto";
import "messages/component/skill_points_smsg.proto";
import "messages/component/skill_list_smsg.proto";
import "messages/component/animation_component_smsg.proto";
import "messages/component/status_effect_list_smsg.proto";
import "messages/master/invest_skill_point_cmsg.proto";
import "messages/master/get_skills_cmsg.proto";
import "messages/master/activate_skill_cmsg.proto";
import "messages/entity/attack_entity_cmsg.proto";
import "messages/entity/vanish_entity_smsg.proto";
import "messages/entity/damage_entity_smsg.proto";
import "messages/inventory/get_inventory_cmsg.proto";
import "messages/inventory/use_item_cmsg.proto";
import "messages/inventory/drop_item_cmsg.proto";
import "messages/inventory/loot_item_cmsg.proto";
import "messages/inventory/equip_item_cmsg.proto";
import "messages/inventory/unequip_item_cmsg.proto";
import "messages/component/equipment_component_smsg.proto";
import "messages/system/request_logout_cmsg.proto";
import "messages/component/logout_intent_smsg.proto";
import "messages/component/casting_component_smsg.proto";
import "messages/party/accept_party_invite_cmsg.proto";
import "messages/party/decline_party_invite_cmsg.proto";
import "messages/party/party_invitation_smsg.proto";
import "messages/party/party_invitation_created_smsg.proto";
import "messages/party/party_invite_declined_smsg.proto";
import "messages/party/party_info_smsg.proto";
import "messages/party/party_error_smsg.proto";
import "messages/party/disband_party_smsg.proto";

option java_package = "net.bestia.bnet.proto";
option java_outer_classname = "EnvelopeProto";

message Envelope {
  // 528 was ComponentRemovedSMSG - superseded by a `removed` field on each removable component's
  // own message (see Removable.kt); left reserved so the tag is never reused for something else.
  reserved 528;

  oneof message {
    // SYSTEM & ACCOUNT 100
    OperationSuccess operation_success = 1;
    OperationError operation_error = 2;

    Authentication authentication = 100;
    Disconnected disconnected = 101;
    AuthenticationSuccess authentication_success = 102;

    Ping ping = 120;
    Pong pong = 121;

    ChatCMSG chat_cmsg = 122;
    ChatSMSG chat_smsg = 123;
    RequestLogoutCMSG request_logout = 124;

    // MAP 200
    // TBD

    // INVENTORY 300
    GetInventoryCMSG get_inventory = 301;
    UseItemCMSG use_item = 302;
    DropItemCMSG drop_item = 303;
    LootItemCMSG loot_item = 304;
    EquipItemCMSG equip_item = 305;
    UnequipItemCMSG unequip_item = 306;

    // MASTER & BESTIA 400
    GetMasterCMSG get_master = 401;
    Master master = 402;
    SelectMasterCMSG select_master = 403;
    GetSelfCMSG get_self = 404;
    SelfSMSG self = 405;
    InvestSkillPointCMSG invest_skill_point = 406;
    GetSkillsCMSG get_skills = 407;
    ActivateSkillCMSG activate_skill = 408;
    CreateMasterCMSG create_master = 409;

    // ENTITY & COMPONENTS 500
    SelectActiveEntity select_active_entity = 500;
    MoveActiveEntity move_active_entity = 501;
    GetAllEntities get_all_entities = 502;
    AttackEntityCMSG attack_entity = 503;
    VanishEntitySMSG vanish_entity = 504;
    DamageEntitySMSG damage_entity = 505;
    PositionComponent comp_position = 510;
    BestiaVisualComponent comp_bestia_visual = 511;
    ItemVisualComponent comp_item_visual = 512;
    MasterVisualComponentSMSG comp_master_visual = 514;
    PathComponentSMSG comp_path = 515;
    SpeedComponentSMSG comp_speed = 516;
    ExpComponentSMSG comp_exp = 517;
    LevelComponentSMSG comp_level = 518;
    ManaComponentSMSG comp_mana = 519;
    HealthComponentSMSG comp_health = 520;
    InventoryComponentSMSG comp_inventory = 521;
    SkillPointsSMSG comp_skill_points = 523;
    SkillListSMSG comp_skill_list = 524;
    AnimationComponentSMSG comp_animation = 525;
    StatusEffectListSMSG comp_effects = 526;
    LogoutIntentSMSG comp_logout_intent = 527;
    StaminaComponentSMSG comp_stamina = 529;
    CarryCapacityComponentSMSG comp_carry_capacity = 530;
    CastingComponentSMSG comp_casting = 531;
    EquipmentComponentSMSG comp_equipment = 532;

    // SOCIAL & PARTY 600
    AcceptPartyInviteCMSG accept_party_invite = 600;
    DeclinePartyInviteCMSG decline_party_invite = 601;
    PartyInvitationSMSG party_invitation = 602;
    PartyInvitationCreatedSMSG party_invitation_created = 603;
    PartyInviteDeclinedSMSG party_invite_declined = 604;
    PartyInfoSMSG party_info = 605;
    PartyErrorSMSG party_error = 606;
    DisbandPartySMSG disband_party = 607;

    // MISC
  }
}