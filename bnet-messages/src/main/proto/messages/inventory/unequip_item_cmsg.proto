syntax = "proto3";

package bnet;

option java_package = "net.bestia.bnet.proto";
option java_outer_classname = "UnequipItemCMSGProto";

/**
 * Asks the server to take whatever is worn in a slot off, back into the inventory.
 */
message UnequipItemCMSG {
  // EquipmentSlot ordinal.
  uint32 slot = 1;
}
