syntax = "proto3";

package bnet;

option java_package = "net.bestia.bnet.proto";
option java_outer_classname = "RequestLogoutCmsgProto";

// Client asks the server to begin the (settlement-protected) logout countdown for its currently
// active master. The server attaches a LogoutIntent component; the countdown, its periodic sync and
// its cancellation are all driven server-side from there.
message RequestLogoutCMSG {
}
