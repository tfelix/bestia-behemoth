syntax = "proto3";

package bnet;

option java_package = "net.bestia.bnet.proto";
option java_outer_classname = "StatusPointsSMSGProto";

/**
 * The number of unspent status points a bestia master currently has available to invest into
 * their base status values.
 */
message StatusPointsSMSG {
  fixed64 entity_id = 1;
  uint32 points = 2;
}
