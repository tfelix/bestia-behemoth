syntax = "proto3";

package bnet;

option java_package = "net.bestia.bnet.proto";
option java_outer_classname = "StatusEffectListSMSGProto";

/**
 * Every currently visible status effect (buff/debuff) active on an entity. Effects marked internal-only
 * (`showIcon = false` server-side) are filtered out before this message is built, so they never
 * appear here.
 */
message StatusEffectListSMSG {
  fixed64 entity_id = 1;
  repeated StatusEffectEntry effects = 2;
}

message StatusEffectEntry {
  uint32 effect_id = 1;
  uint32 level = 2;
  float remaining_seconds = 3;
  bool debuff = 4;
}
