syntax = "proto3";

package bnet;

option java_package = "net.bestia.bnet.proto";
option java_outer_classname = "ComponentRemovedSmsgProto";

// Generic notification that a synced component was removed from an entity (as opposed to the whole
// entity vanishing, which is VanishEntitySMSG). Sent to the same targets the component itself synced
// to. The client maps the enum back to whatever local state that component drove and clears it.
message ComponentRemovedSMSG {
  int64 entity_id = 1;
  RemovableComponent component = 2;
}

// Stable wire ids for the components that opt into removal notifications. Extend as needed; keep in
// sync with the server-side RemovableComponentType mapping and the client dispatch.
enum RemovableComponent {
  REMOVABLE_COMPONENT_UNSPECIFIED = 0;
  LOGOUT_INTENT = 1;
}
