syntax = "proto3";

package bnet;

option java_package = "net.bestia.bnet.proto";
option java_outer_classname = "SkillPointsSMSGProto";

/**
 * The number of unspent skill points a bestia master currently has available to invest into
 * their skill tree.
 */
message SkillPointsSMSG {
  fixed64 entity_id = 1;
  uint32 points = 2;
}
