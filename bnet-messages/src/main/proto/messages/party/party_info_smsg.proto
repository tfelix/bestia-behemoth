syntax = "proto3";

package bnet;

import "messages/vec3.proto";

option java_package = "net.bestia.bnet.proto";
option java_outer_classname = "PartyInfoSmsgProto";

// The full party roster, sent to a member whenever the party or one of its members' online state
// changes (creation, join, leave, kick). Offline members are included without online_data so the
// client can still list them.
message PartyInfoSMSG {
  uint64 party_id = 1;
  string party_name = 2;
  repeated PartyMember member = 3;
}

message PartyMember {
  string master_name = 1;
  optional PartyMemberOnlineData online_data = 2;
}

message PartyMemberOnlineData {
  fixed64 entity_id = 1;
  string area_name = 2;
  Vec3 position = 3;
  uint32 hp_current = 4;
  uint32 hp_max = 5;
}
