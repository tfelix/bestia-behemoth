syntax = "proto3";

package bnet;

option java_package = "net.bestia.bnet.proto";
option java_outer_classname = "PartyErrorSmsgProto";

message PartyErrorSMSG {
  PartyErrorCode error = 1;
}

enum PartyErrorCode {
  PARTY_ERROR_UNSPECIFIED = 0;
  NO_PARTY = 1;
  PLAYER_NOT_FOUND = 2;
  INVITE_EXPIRED = 3;
  NO_PERMISSION = 4;
  ALREADY_IN_PARTY = 5;
  PARTY_NAME_IN_USE = 6;
  INVALID_PARTY_NAME = 7;
  PARTY_FULL = 8;
  NOT_PARTY_MEMBER = 9;
}
