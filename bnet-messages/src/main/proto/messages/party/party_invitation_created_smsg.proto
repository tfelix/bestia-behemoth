syntax = "proto3";

package bnet;

option java_package = "net.bestia.bnet.proto";
option java_outer_classname = "PartyInvitationCreatedSmsgProto";

// Confirmation sent back to the inviter that the invite was (or was not) created.
message PartyInvitationCreatedSMSG {
  uint64 invitation_id = 1;
  uint64 invited_account_id = 2;
  InvitationStatus status = 3;
}

enum InvitationStatus {
  INVITATION_STATUS_UNSPECIFIED = 0;
  INVITATION_CREATED = 1;
  INVITATION_ALREADY_IN_PARTY = 2;
  INVITATION_IGNORED = 3;
}
