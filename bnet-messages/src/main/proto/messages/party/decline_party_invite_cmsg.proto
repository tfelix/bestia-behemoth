syntax = "proto3";

package bnet;

option java_package = "net.bestia.bnet.proto";
option java_outer_classname = "DeclinePartyInviteCmsgProto";

// Client declines a pending party invitation (PartyInvitationSMSG) shown by the join-request prompt.
message DeclinePartyInviteCMSG {
  uint64 invitation_id = 1;
}
