plugins {
	id 'org.jetbrains.kotlin.plugin.spring'
	id 'org.springframework.boot'
	id 'io.spring.dependency-management'
}

group = 'net.bestia.zone'
description = 'zone-server'

dependencies {
	implementation project(':bnet-messages')
	implementation project(':shared')

	implementation 'io.netty:netty-all:4.1.118.Final'
	implementation 'io.github.oshai:kotlin-logging-jvm:7.0.3'
	implementation 'org.springframework.boot:spring-boot-starter'
	implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
	implementation 'org.springframework.boot:spring-boot-starter-security' // needed?
	implementation 'org.jetbrains.kotlin:kotlin-reflect'
	implementation 'org.reflections:reflections:0.10.2'
	implementation 'com.fasterxml.jackson.module:jackson-module-kotlin:2.17.0'
	implementation 'com.fasterxml.jackson.dataformat:jackson-dataformat-yaml:2.17.0'
	implementation 'io.jsonwebtoken:jjwt-api:0.12.6'

    runtimeOnly 'io.jsonwebtoken:jjwt-impl:0.12.6'
	runtimeOnly 'io.jsonwebtoken:jjwt-jackson:0.12.6'
	runtimeOnly 'com.h2database:h2'

	testImplementation 'org.springframework.boot:spring-boot-starter-test'
	testImplementation 'org.jetbrains.kotlin:kotlin-test-junit5'
	testImplementation 'org.awaitility:awaitility:4.2.2'
    testImplementation 'io.mockk:mockk:1.14.5'

    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

allOpen {
	annotation 'jakarta.persistence.Entity'
	annotation 'jakarta.persistence.MappedSuperclass'
	annotation 'jakarta.persistence.Embeddable'
}

tasks.named('test') {
	useJUnitPlatform()
}

/**
 * Enable resource filtering to fill in the version number
 */
processResources {
	filesMatching("**/application.yml") {
		expand(version: project.version)
	}
}


/**
 * Cross-checks (and optionally fixes) skill ids/max levels between zone-server's skill config
 * and the Godot client's Attack DB. See buildSrc/src/main/kotlin/SkillDbSyncTask.kt and
 * .claude/skills/skill-system/SKILL.md.
 */
tasks.register('checkSkillDb', SkillDbSyncTask) {
    group = 'verification'
    description = 'Fails if skills.yml/master_skill_tree.yml and the client Attack DB (.tres + skills.csv) disagree on ids, max levels, or descriptions.'
    skillsYml = layout.projectDirectory.file('src/main/resources/skills.yml')
    masterSkillTreeYml = layout.projectDirectory.file('src/main/resources/master_skill_tree.yml')
    clientDbDir = rootProject.layout.projectDirectory.dir('bestia-client/src/Game/Attack/DB')
    skillsCsv = rootProject.layout.projectDirectory.file('bestia-client/src/Localization/skills.csv')
    fix = false
}

tasks.register('syncSkillDb', SkillDbSyncTask) {
    group = 'other'
    description = 'Patches max_level/description_key in existing client .tres files, syncs English descriptions into skills.csv, and creates stubs for missing skills, from skills.yml/master_skill_tree.yml.'
    skillsYml = layout.projectDirectory.file('src/main/resources/skills.yml')
    masterSkillTreeYml = layout.projectDirectory.file('src/main/resources/master_skill_tree.yml')
    clientDbDir = rootProject.layout.projectDirectory.dir('bestia-client/src/Game/Attack/DB')
    skillsCsv = rootProject.layout.projectDirectory.file('bestia-client/src/Localization/skills.csv')
    fix = true
}

/**
 * Same idea as check/syncSkillDb, for items: item_id/type/weight/equip_slot plus the English
 * description in items.csv. See buildSrc/src/main/kotlin/ItemDbSyncTask.kt.
 */
tasks.register('checkItemDb', ItemDbSyncTask) {
    group = 'verification'
    description = 'Fails if items.yml and the client Item DB (.tres + items.csv) disagree on ids, type, weight, equip slot, or descriptions.'
    itemsYml = layout.projectDirectory.file('src/main/resources/items.yml')
    clientDbDir = rootProject.layout.projectDirectory.dir('bestia-client/src/Game/Item/DB')
    itemsCsv = rootProject.layout.projectDirectory.file('bestia-client/src/Localization/items.csv')
    fix = false
}

tasks.register('syncItemDb', ItemDbSyncTask) {
    group = 'other'
    description = 'Patches type/weight/equip_slot in existing client item .tres files, syncs English descriptions into items.csv, and creates stubs for missing items, from items.yml.'
    itemsYml = layout.projectDirectory.file('src/main/resources/items.yml')
    clientDbDir = rootProject.layout.projectDirectory.dir('bestia-client/src/Game/Item/DB')
    itemsCsv = rootProject.layout.projectDirectory.file('bestia-client/src/Localization/items.csv')
    fix = true
}

/**
 * Exports each bestia species' equipment slot mask into the client's static bestia DB - the client
 * needs it to grey out slots a species does not have, and it is static content that is deliberately
 * never sent over the wire. See buildSrc/src/main/kotlin/BestiaDbSyncTask.kt.
 */
tasks.register('checkBestiaDb', BestiaDbSyncTask) {
    group = 'verification'
    description = 'Fails if the mob YMLs and the client bestia DB (.tres) disagree on equipment slot masks.'
    mobYmlDir = layout.projectDirectory.dir('src/main/resources/mob')
    clientDbDir = rootProject.layout.projectDirectory.dir('bestia-client/src/Game/Bestia/DB')
    fix = false
}

tasks.register('syncBestiaDb', BestiaDbSyncTask) {
    group = 'other'
    description = 'Patches equip_slots in existing client bestia .tres files and creates stubs for missing bestias, from the mob YMLs.'
    mobYmlDir = layout.projectDirectory.dir('src/main/resources/mob')
    clientDbDir = rootProject.layout.projectDirectory.dir('bestia-client/src/Game/Bestia/DB')
    fix = true
}